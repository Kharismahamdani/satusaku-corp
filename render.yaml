services:
  - type: web
    name: satusaku-corp
    runtime: node
    plan: free
    region: singapore
    branch: main
    buildCommand: npm install
    startCommand: node backend/server.js
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3000
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1